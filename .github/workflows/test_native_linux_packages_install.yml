name: Test Native Linux Packages Install

on:
  workflow_call:
    inputs:
      package_install_url:
        description: "Package installation URL from get_s3_config.py (includes architecture subdirectory for RPM)."
        required: true
        type: string
      release_type:
        description: "Release line (dev, nightly, prerelease). Passed to get_url_repo_params get-repo-url and logged; native_linux_package_install_test.py maps dev/nightly to nightly and prerelease to prerelease."
        required: true
        type: string
      gpg_key_url:
        description: "GPG key URL for signed repos"
        required: false
        type: string
        default: ""
      os_profile:
        description: OS profile (e.g., ubuntu2404, rhel10, sles16). Package type (deb/rpm) is derived from this.
        required: true
        type: string
      artifact_group:
        description: Artifact group to extract GPU architecture from (e.g., gfx94X-dcgpu). Default gfx94X-dcgpu.
        required: false
        type: string
        default: "gfx94X-dcgpu"
      install_prefix:
        description: Installation prefix path (optional, defaults to /opt/rocm/core).
        required: false
        type: string
        default: "/opt/rocm/core"
      test_type:
        description: "Test type: sanity (install + basic verification), full (install + basic + rdhc). If not set, script default is used."
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      package_install_url:
        description: "Package installation URL (includes architecture subdirectory for RPM)"
        required: true
        type: string
      release_type:
        description: "Release line (dev, nightly, or prerelease)"
        required: true
        type: choice
        options:
          - dev
          - nightly
          - prerelease
      gpg_key_url:
        description: "GPG key URL for signed repos"
        type: string
        default: ""
      os_profile:
        description: OS profile (package type deb/rpm is derived from this).
        required: true
        type: choice
        options:
          - ubuntu2404
          - rhel10
          - sles16
      artifact_group:
        description: Artifact group to extract GPU architecture from (e.g., gfx94X-dcgpu)
        type: string
        default: "gfx94X-dcgpu"
      install_prefix:
        description: Installation prefix path
        type: string
        default: "/opt/rocm/core"
        required: false
      test_type:
        description: "Test type: sanity or full (optional; leave empty for script default)"
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

run-name: Test - Native Linux packages Install (${{ inputs.os_profile }})

jobs:
  prepare_install_context:
    name: Prepare install context (package type, GPU arch)
    runs-on: ubuntu-24.04
    outputs:
      pkg_type: ${{ steps.derive.outputs.pkg_type }}
      gfx_arch: ${{ steps.derive.outputs.gfx_arch }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Derive package type and GPU architecture
        id: derive
        run: |
          case "${{ inputs.os_profile }}" in
            ubuntu*|debian*) PKG_TYPE="deb" ;;
            *) PKG_TYPE="rpm" ;;
          esac
          echo "pkg_type=${PKG_TYPE}" >> $GITHUB_OUTPUT
          python build_tools/packaging/linux/get_url_repo_params.py extract-gfx-arch \
            --artifact-group "${{ inputs.artifact_group }}" >> $GITHUB_OUTPUT

  test_native_linux_packages_install:
    name: Test Native Linux Packages Installation - ${{ inputs.os_profile }}
    needs: [prepare_install_context]
    strategy:
      fail-fast: false
    runs-on: ${{ github.repository_owner == 'ROCm' && 'linux-gfx942-1gpu-ossci-rocm' || 'ubuntu-24.04' }}
    container:
      # Images by OS profile: sles* -> SUSE BCI 16; ubuntu*/debian* -> ubuntu:24.04; other rpm (non-SLES, e.g. rhel10) -> RHEL UBI 10.
      image: ${{ startsWith(inputs.os_profile, 'sles') && 'registry.suse.com/bci/bci-base:16.0' || ((startsWith(inputs.os_profile, 'ubuntu') || startsWith(inputs.os_profile, 'debian')) && 'ubuntu:24.04') || 'registry.access.redhat.com/ubi10/ubi:10.1' }}
      options: --ipc host
        --privileged
    env:
      REPO_URL: ${{ inputs.package_install_url }}
      GPG_KEY_URL: ${{ inputs.gpg_key_url || '' }}
      OS_PROFILE: ${{ inputs.os_profile }}
      PKG_TYPE: ${{ needs.prepare_install_context.outputs.pkg_type }}
      RELEASE_TYPE: ${{ inputs.release_type }}
      GFX_ARCH: ${{ needs.prepare_install_context.outputs.gfx_arch }}
      INSTALL_PREFIX: ${{ inputs.install_prefix || '/opt/rocm/core' }}
      TEST_TYPE: ${{ inputs.test_type || 'sanity' }}
    steps:
      - name: Install System Prerequisites
        run: |
          echo "Installing prerequisites for ${{ env.PKG_TYPE }} on container"

          if [ "${{ env.PKG_TYPE }}" = "deb" ]; then
            apt update
            apt install -y \
              bash \
              wget \
              curl \
              ca-certificates \
              gpg \
              lsb-release
            if [ "$TEST_TYPE" = "full" ]; then
              echo "Extra OS packages for --test-type full (e.g. rdhc): pciutils, kmod, apt-utils"
              apt install -y pciutils kmod apt-utils
            fi
          elif [[ "${{ inputs.os_profile }}" == sles* ]]; then
            # SLES prerequisites (uses BCI base - zypper)
            zypper refresh
            zypper install -y \
              bash \
              wget \
              curl \
              ca-certificates \
              gpg2 \
              lsb-release \
              update-alternatives
            if [ "$TEST_TYPE" = "full" ]; then
              echo "Extra OS packages for --test-type full on SLES (e.g. rdhc): pciutils, kmod"
              zypper install -y pciutils kmod
            fi
          else
            # rpm (non-SLES on UBI 10); --allowerasing for curl vs curl-minimal on UBI
            dnf install -y --allowerasing \
              bash \
              wget \
              curl \
              ca-certificates \
              gnupg2 \
              dnf-plugins-core
            if [ "$TEST_TYPE" = "full" ]; then
              echo "Extra OS packages for --test-type full (e.g. rdhc): pciutils, kmod"
              dnf install -y --allowerasing pciutils kmod
            fi
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python and install runtime
        run: |
          bash build_tools/packaging/linux/setup_python_cmd.sh \
            --os-profile "${{ inputs.os_profile }}" \
            --install-runtime \
            --output-format github >> $GITHUB_ENV

      - name: Install Python Dependencies
        run: |
          # Use venv for all distros for consistency and future-proofing (PEP 668)
          $PYTHON_CMD -m venv /tmp/test-venv
          /tmp/test-venv/bin/python -m pip install --upgrade pip
          /tmp/test-venv/bin/python -m pip install -r build_tools/packaging/linux/tests/requirements.txt
          echo "PYTHON_CMD=/tmp/test-venv/bin/python" >> $GITHUB_ENV

      - name: Package Installation Test
        id: install-test
        run: |
          echo "TEST - OS:${{ inputs.os_profile }} REPO:${{ env.REPO_URL }} Arch:${{ env.GFX_ARCH }} Type:${{ env.RELEASE_TYPE }}"
          $PYTHON_CMD build_tools/packaging/linux/native_linux_package_install_test.py \
            --test-type "$TEST_TYPE" \
            --os-profile "$OS_PROFILE" \
            --repo-url "$REPO_URL" \
            --gfx-arch "$GFX_ARCH" \
            --install-prefix "$INSTALL_PREFIX" \
            --release-type "$RELEASE_TYPE" \
            --gpg-key-url "$GPG_KEY_URL"

      - name: Test Report
        if: always()
        run: |
          sep='=========================================================================='
          TT=$(echo "${TEST_TYPE:-sanity}" | tr '[:upper:]' '[:lower:]')
          case "$TT" in
            full)
              msg_ok='Package installation full verification completed successfully (repo setup, install, basic verification, RDHC).'
              msg_fail='Package installation full verification did not complete (repo setup, install, basic verification, or RDHC may have failed).'
              ;;
            simulate)
              msg_ok='Simulated package install completed successfully.'
              msg_fail='Simulated package install did not complete successfully.'
              ;;
            *)
              msg_ok='Package installation sanity verification completed successfully (repo setup, install, basic verification).'
              msg_fail='Package installation sanity verification did not complete (repo setup, install, or basic verification may have failed).'
              ;;
          esac

          printf '\n%s\nINSTALL TEST REPORT\n%s\n' "$sep" "$sep"

          if [ "${{ steps.install-test.outcome }}" = "success" ]; then
            printf 'INSTALLATION TEST PASSED\n\nSummary:\n - %s\n\nInstalled at: %s\nFrom: %s\n%s\n' \
              "$msg_ok" "${{ env.INSTALL_PREFIX }}" "${{ env.REPO_URL }}" "$sep"
          else
            printf 'INSTALLATION TEST FAILED\n\n%s\nPlease check the logs above for detailed error messages.\n%s\n' \
              "$msg_fail" "$sep"
            exit 1
          fi
